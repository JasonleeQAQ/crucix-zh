name: crucix-zh

services:
  crucix:
    build:
      context: /opt/1panel/apps/Crucix-zh
      dockerfile: Dockerfile

    container_name: crucix-zh

    restart: unless-stopped

    privileged: true

    ports:
      - "8765:3000"

    env_file:
      - /opt/1panel/apps/Crucix-zh/.env

    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production

      # 强制 Node 优先 IPv4
      NODE_OPTIONS: "--dns-result-order=ipv4first"

      # 避免某些 fetch 超时
      UV_THREADPOOL_SIZE: 64

    # 修复 Docker DNS
    dns:
      - 8.8.8.8
      - 1.1.1.1

    # 容器访问宿主机
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # 数据
      - /opt/1panel/apps/Crucix-zh/data:/app/runs

      # 日志
      - /opt/1panel/apps/Crucix-zh/logs:/app/logs

      # 核心lib目录（实时同步）
      - /opt/1panel/apps/Crucix-zh/lib:/app/lib

    # 修复 healthcheck
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - crucix-network

networks:
  crucix-network:
    name: crucix-network
    driver: bridge